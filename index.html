<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquisitor — Academic Quick Recall</title>
  <link rel="stylesheet" href="style.css?v=8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div id="app-container">

<!-- ══════════════ SCREEN 1: SPLASH ══════════════ -->
<div id="splash" class="screen active">
  <div id="splash-overlay">
    <div id="splash-vid-pid"></div>
    <div id="splash-status">Searching for Inquisitor device…</div>
    <div style="margin-top:14px;">
      <button id="btn-connect" class="btn btn-primary" style="display:none;">CONNECT</button>
      <button id="btn-exit"    class="btn btn-danger"  style="display:none;">EXIT</button>
      <button id="btn-menu"    class="btn btn-success" style="display:none;">MENU</button>
    </div>
  </div>
</div>

<!-- ══════════════ SCREEN 2: MENU ══════════════ -->
<div id="menu" class="screen">

  <!-- Tab bar -->
  <div id="tab-bar">
    <div class="tab">File
      <div class="tab-dropdown">
        <a href="#">New Match</a>
        <a href="#">Save Match</a>
        <a href="#">Load Match</a>
        <a href="#" id="menu-file-exit">Exit</a>
      </div>
    </div>
    <div class="tab">Options
      <div class="tab-dropdown">
        <a href="#">Display Settings</a>
        <a href="#">Sound Settings</a>
      </div>
    </div>
    <div class="tab">Info
      <div class="tab-dropdown">
        <a href="#">About Inquisitor</a>
        <a href="#">Help</a>
      </div>
    </div>
  </div>

  <!-- Menu body -->
  <div id="menu-body">

    <!-- Team One -->
    <div class="team-section">
      <h3>Team One</h3>
      <div class="field-row"><label>Team Name</label><input type="text" id="t1-name" value="Team One"></div>
      <div class="field-row"><label>Player 1</label><input type="text" id="t1-p1" value="Player 1"></div>
      <div class="field-row"><label>Player 2</label><input type="text" id="t1-p2" value="Player 2"></div>
      <div class="field-row"><label>Player 3</label><input type="text" id="t1-p3" value="Player 3"></div>
      <div class="field-row"><label>Player 4</label><input type="text" id="t1-p4" value="Player 4"></div>
      <div class="field-row" id="t1-p5-row"><label>Player 5</label><input type="text" id="t1-p5" value="Player 5"></div>
    </div>

    <!-- Team Two -->
    <div class="team-section">
      <h3>Team Two</h3>
      <div class="field-row"><label>Team Name</label><input type="text" id="t2-name" value="Team Two"></div>
      <div class="field-row"><label>Player 6</label><input type="text" id="t2-p1" value="Player 6"></div>
      <div class="field-row"><label>Player 7</label><input type="text" id="t2-p2" value="Player 7"></div>
      <div class="field-row"><label>Player 8</label><input type="text" id="t2-p3" value="Player 8"></div>
      <div class="field-row"><label>Player 9</label><input type="text" id="t2-p4" value="Player 9"></div>
      <div class="field-row" id="t2-p5-row"><label>Player 10</label><input type="text" id="t2-p5" value="Player 10"></div>
    </div>

    <!-- Settings -->
    <div id="settings-panel">
      <h3>Match Settings</h3>
      <div class="setting-row">
        <label>MATCH TIMER</label>
        <input type="text" id="cfg-match" value="15:00">
      </div>
      <div class="setting-row">
        <label>TOSSUP TIMER (sec)</label>
        <input type="text" id="cfg-tossup" value="5">
      </div>
      <div class="setting-row">
        <label>BONUS TIMER (sec)</label>
        <input type="text" id="cfg-bonus" value="10">
      </div>
      <div class="setting-row">
        <label>SCORE INCREMENT</label>
        <input type="text" id="cfg-score" value="1">
      </div>
    </div>

  </div>

  <div id="menu-footer">
    <button id="btn-continue" class="btn btn-success">CONTINUE</button>
  </div>
</div>

<!-- ══════════════ SCREEN 3: SCOREBOARD ══════════════ -->
<div id="scoreboard" class="screen">

  <!-- Timers -->
  <div id="timer-row">
    <div class="timer-box" id="response-timer-box">
      <div class="timer-label">RESPONSE TIMER</div>
      <div class="timer-value" id="response-timer-value">00</div>
    </div>
    <div class="timer-box" id="match-timer-box">
      <div class="timer-label">MATCH TIMER</div>
      <div class="timer-value" id="match-timer-value">15:00</div>
    </div>
  </div>

  <!-- Buzzing team -->
  <div id="buzz-team-label">&nbsp;</div>

  <!-- Score boxes -->
  <div id="score-row">
    <div class="score-box" id="score-box-0">
      <div class="score-value" id="score-val-0">0</div>
      <div class="score-team-name" id="score-name-0">Team One</div>
    </div>
    <div class="score-box" id="score-box-1">
      <div class="score-value" id="score-val-1">0</div>
      <div class="score-team-name" id="score-name-1">Team Two</div>
    </div>
  </div>

  <!-- Buzzing player -->
  <div id="buzz-player-label">&nbsp;</div>

  <!-- Raw HID debug -->
  <div id="raw-byte-display"></div>

  <!-- Message box overlay -->
  <div id="sb-msgbox" style="display:none;">
    <div id="sb-msgbox-content">
      <div id="sb-msgbox-text"></div>
      <button id="btn-dismiss" class="btn btn-primary">Dismiss</button>
    </div>
  </div>

  <!-- Footer -->
  <div id="sb-footer">
    <button id="btn-back-to-menu" class="btn btn-warning">MENU</button>
  </div>

</div>

</div><!-- #app-container -->
<script src="app.js?v=9"></script>
</body>
</html>
